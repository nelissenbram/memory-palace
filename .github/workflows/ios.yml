name: iOS Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
      BUNDLE_ID: ai.thememorypalace.app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Install Node dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><body>Loading...</body></html>' > out/index.html
          npx cap add ios
          npx cap sync ios

      - name: Copy app icons
        run: cp -r memory-palace-ios-build/icons/* ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Note on entitlements
        run: |
          echo "Skipping push notification and associated domains entitlements for now."
          echo "These can be added later once App ID capabilities are configured."
          echo "The app still has: native camera, haptic feedback, native share, app rating, deep links."

      - name: Add camera permissions to Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Take photos for your memory palace'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Choose photos for your memory palace'" $PLIST 2>/dev/null || true

      - name: Write App Store Connect API key
        run: |
          # Write the .p8 key for xcodebuild
          mkdir -p $HOME/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > $HOME/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

          # Create the JSON file that Fastlane expects
          python3 << 'PYEOF'
          import json, os
          key_id = os.environ["KEY_ID"]
          issuer_id = os.environ["ISSUER_ID"]
          with open(os.path.expanduser("~/private_keys/AuthKey_" + key_id + ".p8"), "r") as f:
              key_content = f.read().strip()
          api_key = {
              "key_id": key_id,
              "issuer_id": issuer_id,
              "key": key_content,
              "in_house": False
          }
          with open("/tmp/api_key.json", "w") as f:
              json.dump(api_key, f)
          print("API key JSON written")
          PYEOF
        env:
          KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}

      - name: Create keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

      - name: Create certificate and provisioning profile
        run: |
          cd ios/App

          # Create/fetch distribution certificate
          fastlane run cert \
            api_key_path:/tmp/api_key.json \
            team_id:"$TEAM_ID" \
            keychain_path:$KEYCHAIN_PATH \
            keychain_password:"$KEYCHAIN_PASS" \
            platform:ios \
            generate_apple_certs:true

          # Create/fetch App Store distribution provisioning profile
          fastlane run sigh \
            api_key_path:/tmp/api_key.json \
            team_id:"$TEAM_ID" \
            app_identifier:"$BUNDLE_ID" \
            platform:ios \
            readonly:false

          # Extract profile UUID and signing identity for manual signing
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -o - -)
            PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -o - -)
            echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
            echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
            echo "Profile: $PROFILE_NAME ($PROFILE_UUID)"
          fi

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "Identity: $SIGNING_IDENTITY"

      - name: Resolve SPM dependencies
        run: |
          cd ios/App
          ls -la
          # Capacitor 8 uses SPM — resolve packages first
          if [ -d "App.xcworkspace" ]; then
            echo "Using workspace"
            xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App
          else
            echo "Using project"
            xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          fi

      - name: Build archive
        run: |
          cd ios/App
          # Detect workspace vs project
          if [ -d "App.xcworkspace" ]; then
            PROJECT_FLAG="-workspace App.xcworkspace"
          else
            PROJECT_FLAG="-project App.xcodeproj"
          fi
          xcodebuild archive \
            $PROJECT_FLAG \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ai.thememorypalace.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/App.ipa \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload IPA as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios
          path: ${{ runner.temp }}/export/App.ipa
          if-no-files-found: ignore

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -rf $HOME/private_keys /tmp/api_key.json /tmp/raw_key.p8
