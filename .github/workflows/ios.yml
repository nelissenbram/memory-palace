name: iOS Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
      BUNDLE_ID: ai.thememorypalace.app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Install Node dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><body>Loading...</body></html>' > out/index.html
          npx cap add ios
          npx cap sync ios

      - name: Copy app icons
        run: cp -r memory-palace-ios-build/icons/* ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Add entitlements
        run: |
          cat > ios/App/App/App.entitlements << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
            <key>com.apple.developer.associated-domains</key>
            <array>
              <string>applinks:thememorypalace.ai</string>
            </array>
          </dict>
          </plist>
          PLIST

      - name: Set entitlements in Xcode project
        run: |
          cd ios/App
          python3 << 'PYEOF'
          with open("App.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()
          if "App.entitlements" not in content:
              content = content.replace(
                  'PRODUCT_BUNDLE_IDENTIFIER = ai.thememorypalace.app;',
                  'PRODUCT_BUNDLE_IDENTIFIER = ai.thememorypalace.app;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App/App.entitlements;'
              )
              with open("App.xcodeproj/project.pbxproj", "w") as f:
                  f.write(content)
              print("Added entitlements to project.pbxproj")
          else:
              print("Entitlements already referenced")
          PYEOF

      - name: Add camera permissions to Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Take photos for your memory palace'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Choose photos for your memory palace'" $PLIST 2>/dev/null || true

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo -n "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Create keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

      - name: Create certificate and provisioning profile
        run: |
          cd ios/App

          # Use API key for authentication (no 2FA needed)
          fastlane run get_certificates \
            api_key_path:~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            keychain_path:$KEYCHAIN_PATH \
            keychain_password:"$KEYCHAIN_PASS" \
            platform:ios \
            generate_apple_certs:true || true

          # If get_certificates didn't work with api_key_path, try inline
          fastlane run cert \
            key_id:"${{ secrets.ASC_API_KEY_ID }}" \
            issuer_id:"${{ secrets.ASC_API_ISSUER_ID }}" \
            key_filepath:~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            team_id:"$TEAM_ID" \
            keychain_path:$KEYCHAIN_PATH \
            keychain_password:"$KEYCHAIN_PASS" \
            platform:ios

          fastlane run sigh \
            key_id:"${{ secrets.ASC_API_KEY_ID }}" \
            issuer_id:"${{ secrets.ASC_API_ISSUER_ID }}" \
            key_filepath:~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            team_id:"$TEAM_ID" \
            app_identifier:"$BUNDLE_ID" \
            platform:ios \
            readonly:false

      - name: Build archive
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/App.ipa \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload IPA as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios
          path: ${{ runner.temp }}/export/App.ipa
          if-no-files-found: ignore

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -rf ~/private_keys
