name: iOS Release Build

on:
  workflow_dispatch:
    inputs:
      skip_test:
        description: 'Skip iPad simulator test'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ── iPad Simulator Test ──────────────────────────────────────────────
  # Boots the app in an iPad Air simulator, waits for content to load,
  # takes a screenshot, and verifies the page is not blank.
  test-ipad:
    if: ${{ inputs.skip_test != 'true' }}
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Capacitor iOS (debug)
        run: |
          mkdir -p out
          cat > out/index.html << 'FALLBACK'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8"/><title>Loading</title>
          <style>body{background:#F2EDE4;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui}
          .s{width:40px;height:40px;border:3px solid #D4C5A9;border-top-color:#8B7355;border-radius:50%;animation:r .8s linear infinite;margin:0 auto 1rem}
          @keyframes r{to{transform:rotate(360deg)}}
          </style></head><body><div style="text-align:center"><div class="s"></div><p>Loading...</p></div></body></html>
          FALLBACK
          npx cap add ios
          npx cap sync ios

      - name: Find iPad simulator
        run: |
          # Find an iPad Air or any iPad simulator
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  name = d['name']
                  if 'iPad Air' in name or 'iPad Pro' in name or 'iPad' in name:
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "IPAD_UDID=$DEVICE" >> $GITHUB_ENV
          echo "Found iPad simulator: $DEVICE"
          xcrun simctl list devices available | grep "$DEVICE" || true

      - name: Boot iPad simulator
        run: |
          xcrun simctl boot "$IPAD_UDID" || true
          # Wait for simulator to be fully booted
          xcrun simctl bootstatus "$IPAD_UDID" -b
          echo "iPad simulator booted"

      - name: Build and install app on simulator
        run: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            PROJECT_FLAG="-workspace App.xcworkspace"
          else
            PROJECT_FLAG="-project App.xcodeproj"
          fi

          xcodebuild build \
            $PROJECT_FLAG \
            -scheme App \
            -configuration Debug \
            -destination "id=$IPAD_UDID" \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Find and install the .app bundle
          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "App.app" -type d | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install "$IPAD_UDID" "$APP_PATH"

      - name: Launch app and capture screenshots
        run: |
          # Launch the app
          xcrun simctl launch "$IPAD_UDID" ai.thememorypalace.app
          echo "App launched, waiting for content to load..."

          # Take screenshots at multiple intervals
          mkdir -p $RUNNER_TEMP/screenshots

          # Screenshot after 5s (should show loading or content)
          sleep 5
          xcrun simctl io "$IPAD_UDID" screenshot $RUNNER_TEMP/screenshots/ipad-05s.png
          echo "Captured: 5s screenshot"

          # Screenshot after 15s (should definitely show content)
          sleep 10
          xcrun simctl io "$IPAD_UDID" screenshot $RUNNER_TEMP/screenshots/ipad-15s.png
          echo "Captured: 15s screenshot"

          # Screenshot after 25s (final state)
          sleep 10
          xcrun simctl io "$IPAD_UDID" screenshot $RUNNER_TEMP/screenshots/ipad-25s.png
          echo "Captured: 25s screenshot"

      - name: Verify content loaded (not blank)
        run: |
          # Check that the 15s screenshot is not a solid color (blank screen)
          # sips gives us pixel dimensions; we use Python to check image variance
          python3 << 'PYEOF'
          import subprocess, sys

          img = "${{ runner.temp }}/screenshots/ipad-15s.png"

          # Get image info via sips
          result = subprocess.run(["sips", "-g", "pixelWidth", "-g", "pixelHeight", img], capture_output=True, text=True)
          print(result.stdout)

          # Use built-in Python to sample pixel colors and check for variance
          # Read raw pixel data via sips conversion to raw format
          subprocess.run(["sips", "-s", "format", "png", img, "--out", "/tmp/check.png"], capture_output=True)

          # Quick check: file size of the screenshot — blank screens are very small (< 50KB)
          import os
          size_kb = os.path.getsize(img) / 1024
          print(f"Screenshot size: {size_kb:.0f} KB")

          if size_kb < 30:
              print("FAIL: Screenshot appears blank (< 30 KB)")
              sys.exit(1)
          else:
              print("PASS: Screenshot has content")
          PYEOF

      - name: Upload iPad screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipad-simulator-screenshots
          path: ${{ runner.temp }}/screenshots/

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$IPAD_UDID" 2>/dev/null || true

  # ── Release Build ────────────────────────────────────────────────────
  build:
    needs: test-ipad
    if: always() && (needs.test-ipad.result == 'success' || inputs.skip_test == 'true')
    runs-on: macos-15
    timeout-minutes: 30

    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
      BUNDLE_ID: ai.thememorypalace.app

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # List available Xcode versions and select the latest
          ls /Applications/ | grep Xcode | sort -V
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: |
          mkdir -p out
          cat > out/index.html << 'FALLBACK'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
            <title>The Memory Palace</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{background:#F2EDE4;font-family:-apple-system,system-ui,sans-serif;
                   display:flex;align-items:center;justify-content:center;height:100vh;
                   color:#5C4A32}
              .wrap{text-align:center;padding:2rem}
              .spinner{width:40px;height:40px;margin:0 auto 1.5rem;
                       border:3px solid #D4C5A9;border-top-color:#8B7355;
                       border-radius:50%;animation:spin .8s linear infinite}
              @keyframes spin{to{transform:rotate(360deg)}}
              h1{font-size:1.25rem;font-weight:600;margin-bottom:.5rem}
              p{font-size:.875rem;color:#8B7355}
              .err{display:none;margin-top:1.5rem}
              .err button{background:#8B7355;color:#fff;border:none;padding:.75rem 1.5rem;
                          border-radius:.5rem;font-size:.875rem;cursor:pointer}
            </style>
          </head>
          <body>
            <div class="wrap">
              <div class="spinner" id="sp"></div>
              <h1>The Memory Palace</h1>
              <p id="msg">Loading your palace...</p>
              <div class="err" id="err">
                <p>Could not connect. Check your internet and try again.</p>
                <button onclick="location.reload()">Retry</button>
              </div>
            </div>
            <script>
              // If the remote app hasn't replaced this page within 8s, show error
              setTimeout(function(){
                document.getElementById('sp').style.display='none';
                document.getElementById('msg').style.display='none';
                document.getElementById('err').style.display='block';
              },8000);
            </script>
          </body>
          </html>
          FALLBACK
          npx cap add ios
          npx cap sync ios

      - name: Bump build number
        run: |
          PLIST="ios/App/App/Info.plist"
          # Set version 1.0, build number from run number (auto-increments)
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" $PLIST
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" $PLIST
          echo "Version: 1.0 (${{ github.run_number }})"

      - name: Copy app icons
        run: cp -r memory-palace-ios-build/icons/* ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Strip alpha channel from app icons
        run: |
          # Apple rejects icons with alpha/transparency
          cd ios/App/App/Assets.xcassets/AppIcon.appiconset
          for icon in *.png; do
            sips -s format png --setProperty formatOptions 100 "$icon" --out "$icon" 2>/dev/null || true
            # Remove alpha channel by flattening onto white background
            python3 -c "
          import subprocess, sys
          f = '$icon'
          # Use sips to remove alpha by converting to jpg and back
          subprocess.run(['sips', '-s', 'format', 'jpeg', f, '--out', f + '.jpg'], capture_output=True)
          subprocess.run(['sips', '-s', 'format', 'png', f + '.jpg', '--out', f], capture_output=True)
          import os
          os.remove(f + '.jpg')
          "
          done
          echo "Alpha channels stripped from all icons"

      - name: Configure Info.plist (permissions, iPad support)
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Take photos for your memory palace'" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Choose photos for your memory palace'" $PLIST 2>/dev/null || true
          # Ensure iPad support (Universal: iPhone + iPad)
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" $PLIST
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" $PLIST
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" $PLIST
          # WKAppBoundDomains — declares primary domain for WKWebView cookie/storage trust
          /usr/libexec/PlistBuddy -c "Delete :WKAppBoundDomains" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :WKAppBoundDomains array" $PLIST
          /usr/libexec/PlistBuddy -c "Add :WKAppBoundDomains:0 string thememorypalace.ai" $PLIST
          # Support all orientations on iPad
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" $PLIST 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" $PLIST
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" $PLIST
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationPortraitUpsideDown" $PLIST
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:2 string UIInterfaceOrientationLandscapeLeft" $PLIST
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:3 string UIInterfaceOrientationLandscapeRight" $PLIST

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Create keychain and import certificate
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -hex 16)

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Decode and import the pre-created distribution certificate
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > $RUNNER_TEMP/dist-cert.p12
          security import $RUNNER_TEMP/dist-cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$DIST_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" $KEYCHAIN_PATH

          # Clean up p12
          rm -f $RUNNER_TEMP/dist-cert.p12

          # Extract signing identity name
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "Signing identity: $SIGNING_IDENTITY"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}

      - name: Fetch provisioning profile
        run: |
          python3 -m venv $RUNNER_TEMP/venv
          $RUNNER_TEMP/venv/bin/pip install pyjwt cryptography --quiet

          $RUNNER_TEMP/venv/bin/python3 << 'PYEOF'
          import jwt, json, urllib.request, urllib.error, datetime, os, base64, subprocess

          key_id = os.environ["KEY_ID"]
          issuer_id = os.environ["ISSUER_ID"]
          bundle_id = os.environ["BUNDLE_ID"]

          with open(os.path.expanduser(f"~/private_keys/AuthKey_{key_id}.p8")) as f:
              p8_key = f.read()

          # Create JWT
          now = datetime.datetime.now(datetime.timezone.utc)
          token = jwt.encode(
              {"iss": issuer_id, "iat": int(now.timestamp()),
               "exp": int((now + datetime.timedelta(minutes=15)).timestamp()),
               "aud": "appstoreconnect-v1"},
              p8_key, algorithm="ES256", headers={"kid": key_id}
          )

          def api_get(path):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/{path}",
                  headers={"Authorization": f"Bearer {token}"}
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          # Find App Store distribution profiles for our bundle ID
          profiles = api_get(f"profiles?filter[profileType]=IOS_APP_STORE&include=bundleId")

          # Get the signing certificate fingerprint from the imported p12
          import hashlib
          cert_fingerprint = None
          cert_result = subprocess.run(
              ["security", "find-identity", "-v", "-p", "codesigning"],
              capture_output=True, text=True
          )
          print(f"Available signing identities:\n{cert_result.stdout}")

          # Get the cert ID from App Store Connect that matches our imported cert
          certs = api_get("certificates?filter[certificateType]=DISTRIBUTION")
          our_cert_id = certs["data"][0]["id"] if certs.get("data") else None
          print(f"Distribution cert ID from ASC: {our_cert_id}")

          profile_data = None
          profile_name = None
          matched_profile_id = None

          for p in profiles.get("data", []):
              attrs = p["attributes"]
              if attrs.get("profileState") == "ACTIVE":
                  bid_ref = p.get("relationships", {}).get("bundleId", {}).get("data", {}).get("id")
                  for included in profiles.get("included", []):
                      if included["id"] == bid_ref and included["attributes"].get("identifier") == bundle_id:
                          matched_profile_id = p["id"]
                          profile_name = attrs["name"]
                          # Check if this profile contains our cert
                          prof_certs = api_get(f"profiles/{p['id']}/certificates")
                          prof_cert_ids = [c["id"] for c in prof_certs.get("data", [])]
                          print(f"Profile '{profile_name}' has certs: {prof_cert_ids}")
                          if our_cert_id and our_cert_id in prof_cert_ids:
                              profile_data = attrs["profileContent"]
                              print(f"Profile matches our cert!")
                          else:
                              # Delete stale profile so we can recreate with correct cert
                              print(f"Profile '{profile_name}' does NOT contain our cert — deleting and recreating")
                              try:
                                  req = urllib.request.Request(
                                      f"https://api.appstoreconnect.apple.com/v1/profiles/{p['id']}",
                                      headers={"Authorization": f"Bearer {token}"},
                                      method="DELETE"
                                  )
                                  urllib.request.urlopen(req)
                                  print(f"Deleted stale profile: {profile_name}")
                              except Exception as e:
                                  print(f"Warning: could not delete profile: {e}")
                          break
              if profile_data:
                  break

          if not profile_data:
              print(f"No active App Store profile found for {bundle_id}")
              print("Creating one via API...")

              # Get bundle ID resource ID
              bundles = api_get(f"bundleIds?filter[identifier]={bundle_id}")
              bundle_res_id = bundles["data"][0]["id"]

              # Get active distribution certificate ID
              certs = api_get("certificates?filter[certificateType]=DISTRIBUTION")
              cert_id = certs["data"][0]["id"]

              # Create profile
              create_body = json.dumps({
                  "data": {
                      "type": "profiles",
                      "attributes": {
                          "name": f"CI App Store {bundle_id}",
                          "profileType": "IOS_APP_STORE"
                      },
                      "relationships": {
                          "bundleId": {"data": {"type": "bundleIds", "id": bundle_res_id}},
                          "certificates": {"data": [{"type": "certificates", "id": cert_id}]}
                      }
                  }
              }).encode()

              req = urllib.request.Request(
                  "https://api.appstoreconnect.apple.com/v1/profiles",
                  data=create_body,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode())

              profile_data = result["data"]["attributes"]["profileContent"]
              profile_name = result["data"]["attributes"]["name"]
              print(f"Created profile: {profile_name}")
          else:
              print(f"Found existing profile: {profile_name}")

          # Decode and install the profile
          profile_bytes = base64.b64decode(profile_data)

          profiles_dir = os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles")
          os.makedirs(profiles_dir, exist_ok=True)

          # Extract UUID from the profile
          result = subprocess.run(
              ["security", "cms", "-D", "-i", "/dev/stdin"],
              input=profile_bytes, capture_output=True
          )
          plist_str = result.stdout.decode()

          # Parse UUID from plist XML
          import re
          uuid_match = re.search(r"<key>UUID</key>\s*<string>([^<]+)</string>", plist_str)
          profile_uuid = uuid_match.group(1)

          profile_path = os.path.join(profiles_dir, f"{profile_uuid}.mobileprovision")
          with open(profile_path, "wb") as f:
              f.write(profile_bytes)

          print(f"Profile UUID: {profile_uuid}")
          print(f"Profile installed to: {profile_path}")

          # Write to GITHUB_ENV
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PROFILE_UUID={profile_uuid}\n")
              f.write(f"PROFILE_NAME={profile_name}\n")
          PYEOF
        env:
          KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}

      - name: Resolve SPM dependencies
        run: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App
          else
            xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          fi

      - name: Configure signing in Xcode project
        run: |
          cd ios/App
          PBXPROJ="App.xcodeproj/project.pbxproj"

          # Inject PROVISIONING_PROFILE_SPECIFIER into existing Release buildSettings
          # for the App target only (the ones that already have INFOPLIST_FILE = App/Info.plist)
          # This uses Python to precisely edit the pbxproj
          python3 << 'PYEOF'
          import re

          with open("App.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()

          import os
          profile_uuid = os.environ["PROFILE_UUID"]
          signing_identity = os.environ["SIGNING_IDENTITY"]
          team_id = os.environ["TEAM_ID"]

          # Find buildSettings blocks that contain INFOPLIST_FILE (= App target)
          # and inject/update provisioning profile
          def inject_signing(match):
              block = match.group(0)
              if "INFOPLIST_FILE" not in block:
                  return block

              # Add/replace PROVISIONING_PROFILE_SPECIFIER
              if "PROVISIONING_PROFILE_SPECIFIER" in block:
                  block = re.sub(
                      r'PROVISIONING_PROFILE_SPECIFIER = "?[^";]*"?;',
                      f'PROVISIONING_PROFILE_SPECIFIER = "{profile_uuid}";',
                      block
                  )
              else:
                  block = block.replace(
                      "buildSettings = {",
                      f'buildSettings = {{\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile_uuid}";'
                  )

              # Set CODE_SIGN_STYLE to Manual
              if "CODE_SIGN_STYLE" in block:
                  block = re.sub(r'CODE_SIGN_STYLE = \w+;', 'CODE_SIGN_STYLE = Manual;', block)
              else:
                  block = block.replace(
                      "buildSettings = {",
                      'buildSettings = {\n\t\t\t\tCODE_SIGN_STYLE = Manual;'
                  )

              # Set CODE_SIGN_IDENTITY
              if "CODE_SIGN_IDENTITY" in block:
                  block = re.sub(
                      r'"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "[^"]*";',
                      f'"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "{signing_identity}";',
                      block
                  )
              else:
                  block = block.replace(
                      "buildSettings = {",
                      f'buildSettings = {{\n\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "{signing_identity}";'
                  )

              # Set DEVELOPMENT_TEAM
              if "DEVELOPMENT_TEAM" in block:
                  block = re.sub(
                      r'DEVELOPMENT_TEAM = \w+;',
                      f'DEVELOPMENT_TEAM = {team_id};',
                      block
                  )

              return block

          # Match buildSettings blocks
          content = re.sub(
              r'buildSettings = \{[^}]+\}',
              inject_signing,
              content,
              flags=re.DOTALL
          )

          with open("App.xcodeproj/project.pbxproj", "w") as f:
              f.write(content)

          print("Signing configured in pbxproj for App target only")
          PYEOF

      - name: Build archive
        run: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            PROJECT_FLAG="-workspace App.xcworkspace"
          else
            PROJECT_FLAG="-project App.xcodeproj"
          fi

          xcodebuild archive \
            $PROJECT_FLAG \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ai.thememorypalace.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/App.ipa \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload IPA as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios
          path: ${{ runner.temp }}/export/App.ipa
          if-no-files-found: ignore

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -rf ~/private_keys
