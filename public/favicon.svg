<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Classical temple — 5 columns, rightmost missing — terracotta #C17F59 -->

  <!-- Pediment (triangular roof) -->
  <polygon points="32,5 8,22 56,22" fill="#C17F59"/>

  <!-- Peak acroterion ornament -->
  <circle cx="32" cy="7" r="1.5" fill="#C17F59"/>

  <!-- Entablature beam -->
  <rect x="7" y="22" width="50" height="3.5" rx="0.5" fill="#C17F59"/>

  <!-- Column 1 (leftmost) -->
  <rect x="9" y="25.5" width="5.4" height="1.6" rx="0.8" fill="#C17F59"/>
  <rect x="9.8" y="27.1" width="3.8" height="22.4" rx="1.2" fill="#C17F59"/>
  <rect x="8.8" y="49.5" width="5.8" height="1.6" rx="0.8" fill="#C17F59"/>

  <!-- Column 2 -->
  <rect x="19.5" y="25.5" width="5.4" height="1.6" rx="0.8" fill="#C17F59"/>
  <rect x="20.3" y="27.1" width="3.8" height="22.4" rx="1.2" fill="#C17F59"/>
  <rect x="19.3" y="49.5" width="5.8" height="1.6" rx="0.8" fill="#C17F59"/>

  <!-- Column 3 (center) -->
  <rect x="30" y="25.5" width="5.4" height="1.6" rx="0.8" fill="#C17F59"/>
  <rect x="30.8" y="27.1" width="3.8" height="22.4" rx="1.2" fill="#C17F59"/>
  <rect x="29.8" y="49.5" width="5.8" height="1.6" rx="0.8" fill="#C17F59"/>

  <!-- Column 4 -->
  <rect x="40.5" y="25.5" width="5.4" height="1.6" rx="0.8" fill="#C17F59"/>
  <rect x="41.3" y="27.1" width="3.8" height="22.4" rx="1.2" fill="#C17F59"/>
  <rect x="40.3" y="49.5" width="5.8" height="1.6" rx="0.8" fill="#C17F59"/>

  <!-- Column 5 (rightmost) — MISSING — warm glow placeholder -->
  <ellipse cx="53.7" cy="38" rx="2.2" ry="8" fill="#E8A74E" opacity="0.18"/>
  <ellipse cx="53.7" cy="38" rx="1.2" ry="5" fill="#E8A74E" opacity="0.12"/>

  <!-- Stylobate / steps -->
  <rect x="5" y="51.1" width="54" height="3" rx="0.5" fill="#C17F59"/>
  <rect x="3" y="54.1" width="58" height="3" rx="0.5" fill="#C17F59"/>
  <rect x="1" y="57.1" width="62" height="3.2" rx="0.5" fill="#C17F59"/>
