<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Classical building / palace silhouette in terracotta -->
  <g fill="#C17F59">
    <!-- Pediment (triangle roof) -->
    <polygon points="32,6 8,22 56,22"/>
    <!-- Entablature (beam below pediment) -->
    <rect x="6" y="22" width="52" height="4" rx="0.5"/>
    <!-- Columns -->
    <rect x="10" y="26" width="5" height="26" rx="1"/>
    <rect x="21" y="26" width="5" height="26" rx="1"/>
    <rect x="32" y="26" width="5" height="26" rx="1"/>
    <rect x="43" y="26" width="5" height="26" rx="1"/>
    <!-- Column bases -->
    <rect x="9" y="50" width="7" height="2" rx="0.5"/>
    <rect x="20" y="50" width="7" height="2" rx="0.5"/>
    <rect x="31" y="50" width="7" height="2" rx="0.5"/>
    <rect x="42" y="50" width="7" height="2" rx="0.5"/>
    <!-- Column capitals -->
    <rect x="9" y="25" width="7" height="2" rx="0.5"/>
    <rect x="20" y="25" width="7" height="2" rx="0.5"/>
    <rect x="31" y="25" width="7" height="2" rx="0.5"/>
    <rect x="42" y="25" width="7" height="2" rx="0.5"/>
    <!-- Base/steps -->
    <rect x="4" y="52" width="56" height="3" rx="0.5"/>
    <rect x="2" y="55" width="60" height="3" rx="0.5"/>
  </g>
</svg>
