<!DOCTYPE html>
<html>
<head>
<title>Memory Palace — Cache Reset</title>
<style>
  body { font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #FAFAF7; }
  .box { text-align: center; max-width: 400px; padding: 40px; }
  h1 { font-size: 20px; color: #2C2C2A; }
  p { color: #8B7355; font-size: 14px; line-height: 1.6; }
  .status { margin-top: 20px; padding: 12px; border-radius: 8px; background: #f0ede8; font-size: 13px; }
  .done { background: #e8f0e8; color: #4A6741; }
  a { color: #C17F59; }
</style>
</head>
<body>
<div class="box">
  <h1>🏛️ Memory Palace — Cache Reset</h1>
  <p>Clearing all cached data...</p>
  <div class="status" id="status">Working...</div>
</div>
<script>
(async function() {
  const el = document.getElementById('status');
  const log = [];

  try {
    // 1. Unregister ALL service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        await reg.unregister();
        log.push('Unregistered SW: ' + reg.scope);
      }
      if (regs.length === 0) log.push('No service workers found');
    }

    // 2. Delete ALL caches
    if ('caches' in window) {
      const names = await caches.keys();
      for (const name of names) {
        await caches.delete(name);
        log.push('Deleted cache: ' + name);
      }
      if (names.length === 0) log.push('No caches found');
    }

    // 3. Clear localStorage version flags
    localStorage.removeItem('mp_v');
    localStorage.removeItem('mp_app_version');
    log.push('Cleared version flags');

    el.className = 'status done';
    el.innerHTML = '✓ All caches cleared! Redirecting...';
    // Auto-redirect back to palace with cb flag to avoid loop
    setTimeout(function() { window.location.href = '/palace?cb=1'; }, 1500);
  } catch(e) {
    el.innerHTML = 'Error: ' + e.message + '<br><br>' + log.join('<br>') +
      '<br><br><a href="/palace?cb=1">→ Go to your Memory Palace</a>';
  }
})();
</script>
</body>
</html>
